<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DBD Flashbang Timing Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap');

body {
  background: #0d0d0d;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px;
  transition: background 0.3s, color 0.3s;
}
body.light { background: #f0f0f0; color: #111; }

h1 { font-family: 'Montserrat', sans-serif; font-size: 36px; margin-bottom: 20px; }

.killer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px,1fr)); gap:50px; margin-bottom:20px; }

.killer-card {
  cursor: pointer;
  border:2px solid transparent;
  border-radius:7px;
  overflow:hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  position:relative;
}
.killer-card:hover {
  transform: scale(1.05);
  border-color:#ff3b3b;
  box-shadow:0 0 8px rgba(255,59,59,0.3);
}
.killer-card.favorite::after {
  content:"★";
  position:absolute; top:5px; right:5px;
  color:gold; font-size:18px;
}
.killer-card.active {
  animation: pulse 1s infinite;
}
.killer-card.bugged::before {
  content:"";
  position:absolute; top:0; left:0; width:100%; height:4px;
  background-color:red;
  border-top-left-radius:7px; border-top-right-radius:7px;
}

@keyframes pulse {
  0%,100% { box-shadow:0 0 8px rgba(255,59,59,0.3); }
  50% { box-shadow:0 0 12px rgba(255,59,59,0.5); }
}

.killer-card img { width:100%; border-radius:7px; display:block; }

#videoContainerWrapper {
  display:flex; justify-content:center; align-items:flex-start; gap:20px; margin-bottom:20px;
}
#videoContainer {
  display:flex; flex-direction: column; align-items: center; width:90%; max-width:900px; gap:12px;
}
video { width:100%; border-radius:12px; box-shadow:0 0 10px rgba(255,255,255,0.2); display:block; }

#bottomControls { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; width:100%; }

button, select, input[type=range] { min-width:100px; margin:4px; border-radius:6px; padding:6px; font-size:14px; }
button { background:#ff3b3b; color:white; border:none; cursor:pointer; transition:background 0.2s; }
button:hover { background:#ff5b5b; }

#buggedMessage { color:red; font-size:16px; text-align:center; display:none; padding:40px; width:100%; box-sizing:border-box; }

</style>
</head>
<body>

<h1>DBD Flashbang Timing Tool</h1>

<div class="killer-grid" id="killerGrid"></div>

<div id="videoContainerWrapper">
  <div id="videoContainer">
    <video id="videoPlayer" controls></video>
    <div id="buggedMessage"></div>
    <div id="bottomControls">
      <button id="playPauseBtn">Play</button>
      <input type="range" id="progressBar" min="0" max="100" value="0">
      <select id="speedSelect">
        <option value="0.25">0.25x</option>
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
      </select>
    </div>
  </div>
</div>

<script>
// --- Persistent Favorites and Dynamic Loader ---
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let currentKiller = null;
const killerGrid = document.getElementById("killerGrid");
const video = document.getElementById("videoPlayer");
const buggedMessageDiv = document.getElementById("buggedMessage");

// Fetch videos.json dynamically
async function loadKillers() {
  const res = await fetch('videos.json');
  const videos = await res.json();

  killerGrid.innerHTML = "";

  // Sort favorites first
  videos.sort((a,b) => {
    const aFav = favorites.includes(a.name);
    const bFav = favorites.includes(b.name);
    if(aFav && !bFav) return -1;
    if(!aFav && bFav) return 1;
    return 0;
  });

  videos.forEach(killer => {
    const card = document.createElement("div");
    card.className = "killer-card";
    card.title = killer.name;
    if(favorites.includes(killer.name)) card.classList.add("favorite");
    if(killer.bugged) card.classList.add("bugged");

    card.innerHTML = `<img src="${killer.thumbnail}" alt="${killer.name}">`;

    card.addEventListener("click", () => loadVideo(killer));
    card.addEventListener("contextmenu", e => {
      e.preventDefault();
      toggleFavorite(killer.name);
    });

    killerGrid.appendChild(card);
  });
}

// --- Load Video ---
function loadVideo(killer) {
  currentKiller = killer.name;
  highlightActiveKiller();

  if(killer.bugged) {
    video.style.display="none";
    buggedMessageDiv.style.display="block";
    buggedMessageDiv.textContent="This killer is bugged and cannot be locker bang saved.";
  } else {
    video.style.display="block";
    buggedMessageDiv.style.display="none";
    video.src = `videos/${killer.name}.mp4`;
    video.load();
    video.play().catch(()=>{});
  }
}

// --- Highlight Active Killer ---
function highlightActiveKiller() {
  document.querySelectorAll(".killer-card").forEach(card => {
    card.classList.remove("active");
    if(card.title === currentKiller) card.classList.add("active");
  });
}

// --- Toggle Favorite ---
function toggleFavorite(name) {
  if(favorites.includes(name)) {
    favorites = favorites.filter(f => f !== name);
  } else favorites.push(name);

  localStorage.setItem("favorites", JSON.stringify(favorites));
  loadKillers(); // reload to update sorting and favorites
}

// --- Video Controls ---
const playPauseBtn = document.getElementById("playPauseBtn");
const progressBar = document.getElementById("progressBar");
const speedSelect = document.getElementById("speedSelect");

playPauseBtn.addEventListener("click", () => {
  if(video.paused) video.play();
  else video.pause();
  playPauseBtn.textContent = video.paused?"Play":"Pause";
});

video.addEventListener("timeupdate", () => {
  progressBar.value = (video.currentTime/video.duration)*100 || 0;
});

progressBar.addEventListener("input", () => video.currentTime = (progressBar.value/100)*video.duration);

speedSelect.addEventListener("change", () => video.playbackRate = parseFloat(speedSelect.value));

// --- Initialize ---
loadKillers();

</script>

</body>
</html>
